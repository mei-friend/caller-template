name: Call automation workflow

on:
  workflow_dispatch:
    inputs:
      work_package:
        description: "The work package you want to run."
        required: true
        type: string
      filepath:
        description: "MEI file you want to change."
        required: true
        type: string
      parameters:
        description: "Additional parameters filled out by the user"
        required: false
        type: string
      commit_message:
        description: "Commit message added by mei-friend or manually when dispatching"
        required: true
        type: string

permissions:
  contents: write

jobs:
  call-shared:
    uses: mei-friend/automation/.github/workflows/central.yml@main
    with:
      workpackage_id: ${{ github.event.inputs.work_package }}
      filepath: ${{ github.event.inputs.filepath }}
      addargs: ${{ github.event.inputs.parameters }}
      commit_message: ${{ github.event.inputs.commit_message }}

